servers:
  pyrefly:
    command: uvx
    args: ["pyrefly", "lsp"]
    fileTypes: [".py", ".pyi"]
    rootMarkers: ["pyrefly.toml", ".git"]
    initOptions:
      pyrefly:
        typeCheckingMode: default

  ruff:
    command: uvx
    args: ["ruff", "server", "--color", "never"]
    fileTypes: [".py", ".pyi"]
    rootMarkers: ["ruff.toml", ".git"]
